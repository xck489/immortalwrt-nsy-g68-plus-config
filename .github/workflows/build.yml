name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 克隆源码
        uses: actions/checkout@v4
        with:
          repository: linyueweia/immortalwrt-nsy-g68-plus
          path: openwrt
          sparse-checkout: |
            .feeds.conf
            configs
            feeds
          sparse-checkout-cone-mode: false

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pip python3-pyelftools
          df -h

      - name: 准备编译
        run: |
          cd openwrt
          cp ${{ github.workspace }}/.feeds.conf .feeds.conf 2>/dev/null || true
          cp ${{ github.workspace }}/configs/g68_mtk_wifi.config .config
          TZ=Asia/Shanghai ./scripts/feeds update -a && ./scripts/feeds install -a
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j8

      - name: 编译固件
        run: |
          cd openwrt
          df -h
          make -j$(nproc) world

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7

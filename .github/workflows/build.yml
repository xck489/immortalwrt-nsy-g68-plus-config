name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-hours: 6
    steps:
      - name: 克隆源码仓库
        uses: actions/checkout@v4
        with:
          repository: linyueweia/immortalwrt-nsy-g68-plus
          path: openwrt
          submodules: true
          fetch-depth: 1

      - name: 克隆配置仓库
        uses: actions/checkout@v4
        with:
          repository: linyueweia/immortalwrt-nsy-g68-plus-config
          path: firmware-config
          fetch-depth: 1

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pip python3-pyelftools perl libperl-dev file rsync
          df -h

      - name: 准备配置文件
        run: |
          cd openwrt
          cp ../firmware-config/.config .
          cp .feeds.conf feeds.conf 2>/dev/null || cp feeds.conf.default feeds.conf

      - name: 更新并安装 feeds
        run: |
          cd openwrt
          TZ=Asia/Shanghai ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置
        run: |
          cd openwrt
          make defconfig

      - name: 下载依赖
        run: |
          cd openwrt
          make download -j8

      - name: 编译固件
        run: |
          cd openwrt
          df -h
          make -j$(nproc) world

      - name: 上传固件
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7

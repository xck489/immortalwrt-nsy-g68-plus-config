name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/zhoufuli/immortalwrt-rk356x
  REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          path: config

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4

      - name: Build
        run: |
          REPO_ROOT=$PWD
          echo "Repo root: $REPO_ROOT"

          # 克隆源码
          git clone $REPO_URL -b $REPO_BRANCH $REPO_ROOT/openwrt

          # 复制 feeds 配置
          cp $REPO_ROOT/config/feeds.conf.default $REPO_ROOT/openwrt/feeds.conf

          # 克隆 istore 并手动安装
          git clone https://github.com/linkease/istore.git /tmp/istore
          mkdir -p $REPO_ROOT/openwrt/package/feeds/istore/
          cp -r /tmp/istore/luci/luci-app-store $REPO_ROOT/openwrt/package/feeds/istore/
          cp -r /tmp/istore/luci/luci-lib-taskd $REPO_ROOT/openwrt/package/feeds/istore/
          cp -r /tmp/istore/luci/luci-lib-xterm $REPO_ROOT/openwrt/package/feeds/istore/
          cp -r /tmp/istore/luci/taskd $REPO_ROOT/openwrt/package/feeds/istore/
          ls -la $REPO_ROOT/openwrt/package/feeds/istore/

          # 更新 feeds
          cd $REPO_ROOT/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 复制配置并生成完整配置
          cp $REPO_ROOT/config/configs/nsy_g68-plus.config .config
          echo "=== 使用的配置文件 ==="
          echo "源配置: $REPO_ROOT/config/configs/nsy_g68-plus.config"
          ls -la $REPO_ROOT/config/configs/
          echo "SHA256: $(sha256sum $REPO_ROOT/config/configs/nsy_g68-plus.config | cut -c1-64)"
          make defconfig
          make oldconfig MAKEFLAGS=-y

          # 强制禁用 rust host 包（避免编译失败）
          echo "=== 禁用 rust host 包 ==="
          sed -i "/# CONFIG_PACKAGE_rust is not set/d" .config
          sed -i "/CONFIG_RUST_SCCACHE/d" .config
          echo "# CONFIG_PACKAGE_rust is not set" >> .config


          # 强制写入 istore 配置
          echo "=== 修复 istore 配置 ==="
          sed -i "/CONFIG_PACKAGE_luci-app-store=/d" .config
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config

          echo "=== 验证设备配置 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE_nsy_g68-plus=y" .config && echo "✅ 设备配置正确" || echo "❌ 设备配置缺失"
          grep -F "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ istore 已配置" || echo "⚠️ istore 未配置"
          grep -F "CONFIG_PACKAGE_luci=y" .config && echo "✅ LuCI 已配置" || echo "⚠️ LuCI 未配置"

          make download -j8
          make -j1 world

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz

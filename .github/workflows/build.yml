name: nsy-g68-plus-build

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装编译依赖
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pip python3-pyelftools
      
      - name: 克隆源码
        run: |
          git clone https://github.com/zhoufuli/immortalwrt-rk356x -b main openwrt
          cp .config openwrt/.config
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j8
          make -j$(nproc) world
      
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOURCE_REPO: linyueweia/immortalwrt-nsy-g68-plus
  SOURCE_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          path: immortalwrt
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout config (this repo)
        uses: actions/checkout@v4
        with:
          path: config-repo
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pip python3-pyelftools

      - name: Prepare config and feeds
        run: |
          cd immortalwrt
          chmod +x config-repo/.github/scripts/*.sh
          chmod +x scripts/*.sh
          config-repo/.github/scripts/prepare.sh

      - name: Build
        run: |
          cd immortalwrt
          ./scripts/build.sh

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: immortalwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/zhoufuli/immortalwrt-rk356x
  REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/gnome /usr/share/libreoffice /usr/share/hubble /usr/share/mythes /usr/share/omex
          sudo rm -rf /etc/apt/sources.list.d/* /var/cache/apt/archives/*.deb /var/lib/apt/lists/*
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo libncurses-dev python3 libncurses5-dev python3-dev python3-setuptools libssl-dev gettext zlib1g-dev file wget git curl unzip gettext pkg-config gawk diffutils xz-utils bc automake cmake device-tree-compiler ccache libtool autoconf autogen m4 python3-pip

      - name: Clone source code
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          df -h

      - name: Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          cd openwrt
          cp ${{ github.workspace }}/configs/g68_mtk_wifi.config .config

      - name: Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) world

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7

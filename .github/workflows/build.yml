name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/zhoufuli/immortalwrt-rk356x
  REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4

      - name: Build
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt

          # 备份原始配置文件
          cp ../configs/nsy_g68-plus.config .config.backup

          # 复制 feeds 配置
          cp .feeds.conf.default feeds.conf 2>/dev/null || true
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 确认 istore feed 是否安装
          echo "=== 检查 istore feed ==="
          ls feeds/istore/applications/ 2>/dev/null | grep store || echo "istore feed 目录为空或不存在"

          # 从备份恢复 .config，然后让 defconfig/oldconfig 在此基础上更新
          cp .config.backup .config
          make defconfig
          make oldconfig MAKEFLAGS=-y

          # 强制写入关键配置（防止 oldconfig 重置）
          echo "=== 修复 istore 配置 ==="
          sed -i '/CONFIG_PACKAGE_luci-app-store/d' .config
          sed -i '/CONFIG_PACKAGE_luci-app-store-btop/d' .config
          sed -i '/CONFIG_PACKAGE_luci-app-store-dockerman/d' .config
          sed -i '/CONFIG_PACKAGE_luci-app-store-argon/d' .config
          sed -i '/CONFIG_PACKAGE_luci-app-store-filebrowser/d' .config
          echo 'CONFIG_PACKAGE_luci-app-store=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-store-btop=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-store-dockerman=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-store-argon=y' >> .config
          echo 'CONFIG_PACKAGE_luci-app-store-filebrowser=y' >> .config

          echo "=== 验证设备配置 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE_nsy_g68-plus=y" .config && echo "✅ 设备配置正确: DEVICE_nsy_g68-plus" || echo "❌ 设备配置缺失!"
          grep -F "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ istore 应用商店已配置" || echo "⚠️ istore 未配置"
          grep -F "CONFIG_PACKAGE_luci=y" .config && echo "✅ LuCI 已配置" || echo "⚠️ LuCI 未配置"

          make download -j8
          make -j$(nproc) world

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 600

    steps:
      - name: Clone source repository
        uses: actions/checkout@v4
        with:
          repository: linyueweia/immortalwrt-nsy-g68-plus
          path: openwrt
          fetch-depth: 1

      - name: Clone config repository
        uses: actions/checkout@v4
        with:
          repository: linyueweia/immortalwrt-nsy-g68-plus-config
          path: firmware-config
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libncurses-dev zlib1g-dev libssl-dev wget git curl unzip gettext pkg-config python3 python3-pip python3-pyelftools gawk diffutils xz-utils file bc bison flex automake cmake help2man ocaml sparse ccache rsync time device-tree-compiler clang

      - name: Prepare config
        run: |
          cd openwrt
          cp ../firmware-config/.config .config
          cp .feeds.conf feeds.conf 2>/dev/null || cp feeds.conf.default feeds.conf

      - name: Update and install feeds
        run: |
          cd openwrt
          TZ=Asia/Shanghai ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Validate configuration
        run: |
          cd openwrt
          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) world V=s 2>&1 | tee build.log
        id: build

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            openwrt/bin/targets/rockchip/armv8/**/*.img
            openwrt/bin/targets/rockchip/armv8/**/*.img.gz
            openwrt/bin/targets/rockchip/armv8/**/md5sums
            openwrt/build.log
          retention-days: 7
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            openwrt/.config
            openwrt/build.log
          retention-days: 7

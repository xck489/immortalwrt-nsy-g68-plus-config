name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/zhoufuli/immortalwrt-rk356x
  REPO_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4

      - name: Build
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          cp ../configs/nsy_g68-plus.config .config
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make oldconfig MAKEFLAGS=-y

          echo "=== 验证设备配置 ==="
          grep "CONFIG_TARGET_rockchip_armv8_DEVICE_nsy_g68-plus=y" .config && echo "✅ 设备配置正确: DEVICE_nsy_g68-plus" || echo "❌ 设备配置缺失!"
          grep "CONFIG_TARGET_PROFILE=" .config
          grep "CONFIG_TARGET_BOARD=" .config
          grep "CONFIG_PACKAGE_luci-app-store=y" .config && echo "✅ istore 应用商店已配置" || echo "⚠️ istore 未配置"
          grep "CONFIG_PACKAGE_luci=y" .config && echo "✅ LuCI 已配置" || echo "⚠️ LuCI 未配置"

          make download -j8
          make -j$(nproc) world

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/bin/targets/rockchip/armv8/*.img.gz

name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOURCE_REPO: linyueweia/immortalwrt-nsy-g68-plus
  SOURCE_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          path: immortalwrt
          fetch-depth: 1
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout config (this repo)
        uses: actions/checkout@v4
        with:
          path: config-repo
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装编译依赖
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gperf texinfo libncurses-dev python3 libssl-dev gettext zlib1g-dev git curl unzip gawk diffutils xz-utils bc automake ccache libtool m4 python3-pip python3-pyelftools

      - name: 准备配置文件
        run: |
          cd immortalwrt
          cp config-repo/.feeds.conf feeds.conf.default
          cp config-repo/.config .config

      - name: 编译固件
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make download -j8
          make -j$(nproc) world

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: immortalwrt/bin/targets/rockchip/armv8/*.img.gz
          retention-days: 7
